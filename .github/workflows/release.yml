name: Release changojigi-fabric-mod

on:
  workflow_dispatch:
    inputs:
      version:
        description: '릴리즈 버전 (예: 1.0.1) — 비워두면 마지막 태그에서 패치 자동 증가'
        required: false
        type: string
      prerelease:
        description: '프리릴리즈 여부'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 태그 전체 히스토리 필요

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Determine version and create tag
        id: tag
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            # 마지막 v* 태그에서 패치 버전 자동 증가
            LATEST=$(git tag --sort=-v:refname | grep '^v' | head -1)
            if [ -z "$LATEST" ]; then
              VERSION="1.0.1"
            else
              IFS='.' read -r major minor patch <<< "${LATEST#v}"
              VERSION="$major.$minor.$((patch + 1))"
            fi
          fi

          TAG="v$VERSION"

          # 이미 존재하는 태그인지 확인
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::태그 $TAG 가 이미 존재합니다."
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "▶ 릴리즈 버전: $TAG"

      - name: Build all versions
        run: ./gradlew clean build -Pmod_version=${{ steps.tag.outputs.version }}

      - name: Stage release JARs
        shell: bash
        run: |
          mkdir -p release-jars
          find mc1_21_4/build/libs \
               mc1_21_5/build/libs \
               mc1_21_7/build/libs \
               mc1_21_8/build/libs \
               mc1_21_10/build/libs \
               mc1_21_11/build/libs \
               -name "*.jar" \
               ! -name "*-sources.jar" \
               ! -name "*-dev.jar" \
               -exec cp {} release-jars/ \;

          echo "── Release JARs ──"
          ls -lh release-jars/

          if [ -z "$(ls -A release-jars/)" ]; then
            echo "::error::릴리즈할 JAR 파일이 없습니다."
            exit 1
          fi

      - name: Push tag
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.tag.outputs.tag }}"
          git push origin "${{ steps.tag.outputs.tag }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ inputs.prerelease }}
          files: release-jars/*.jar
