name: Release changojigi-fabric-mod

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Derive release version from tag
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ -z "$VERSION" || "$VERSION" == "$GITHUB_REF_NAME" ]]; then
            echo "Tag must start with v, got: $GITHUB_REF_NAME" >&2
            exit 1
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build all versions
        run: ./gradlew clean build -Pmod_version=${{ steps.version.outputs.value }}

      - name: Stage release JARs
        shell: bash
        run: |
          mkdir -p release-jars
          find mc1_21_4/build/libs \
               mc1_21_5/build/libs \
               mc1_21_7/build/libs \
               mc1_21_8/build/libs \
               mc1_21_10/build/libs \
               mc1_21_11/build/libs \
               -name "*.jar" \
               ! -name "*-sources.jar" \
               ! -name "*-dev.jar" \
               -exec cp {} release-jars/ \;

          echo "── Release JARs ──"
          ls -lh release-jars/

          if [ -z "$(ls -A release-jars/)" ]; then
            echo "::error::No release JARs found" >&2
            exit 1
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: release-jars/*.jar
