name: Release changojigi-fabric-mod

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Derive release version from tag
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ -z "$VERSION" || "$VERSION" == "$GITHUB_REF_NAME" ]]; then
            echo "Tag must start with v, got: $GITHUB_REF_NAME" >&2
            exit 1
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build all versions
        run: ./gradlew clean build -Pmod_version=${{ steps.version.outputs.value }}

      - name: Collect release JARs
        id: assets
        shell: bash
        run: |
          shopt -s nullglob
          files=()
          for dir in mc1_21_4 mc1_21_5 mc1_21_7 mc1_21_8 mc1_21_10 mc1_21_11; do
            for jar in "$dir/build/libs/"*.jar; do
              case "$jar" in
                *-sources.jar|*-dev.jar) continue ;;
                *) files+=("$jar") ;;
              esac
            done
          done

          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No release JARs found" >&2
            exit 1
          fi

          # GitHub Actions multiline output
          {
            echo "paths<<EOF"
            for f in "${files[@]}"; do echo "$f"; done
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "Found JARs:"
          printf '  %s\n' "${files[@]}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: ${{ steps.assets.outputs.paths }}
