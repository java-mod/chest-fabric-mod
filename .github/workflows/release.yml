name: Release changojigi-fabric-mod

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Derive release version from tag
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ -z "$VERSION" || "$VERSION" == "$GITHUB_REF_NAME" ]]; then
            echo "Tag must start with v, got: $GITHUB_REF_NAME" >&2
            exit 1
          fi

          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build release jar
        run: ./gradlew clean build -Pmod_version=${{ steps.version.outputs.value }}

      - name: Resolve release asset
        id: asset
        shell: bash
        run: |
          shopt -s nullglob
          jars=(build/libs/*.jar)

          selected=""
          for jar in "${jars[@]}"; do
            case "$jar" in
              *-sources.jar|*-dev.jar)
                continue
                ;;
              *)
                selected="$jar"
                break
                ;;
            esac
          done

          if [[ -z "$selected" ]]; then
            echo "No release jar found in build/libs" >&2
            ls -al build/libs >&2 || true
            exit 1
          fi

          echo "path=$selected" >> "$GITHUB_OUTPUT"
          echo "Selected asset: $selected"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: ${{ steps.asset.outputs.path }}
