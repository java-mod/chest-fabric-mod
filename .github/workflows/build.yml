name: Build changojigi-fabric-mod

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: [mc1_21_4, mc1_21_5, mc1_21_7, mc1_21_8, mc1_21_10, mc1_21_11]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Build ${{ matrix.version }}
        run: ./gradlew :${{ matrix.version }}:build

      - name: Upload ${{ matrix.version }} artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: ${{ matrix.version }}-jars
          path: |
            ${{ matrix.version }}/build/libs/*.jar
            !${{ matrix.version }}/build/libs/*-dev.jar
            !${{ matrix.version }}/build/libs/*-sources.jar
          if-no-files-found: warn
